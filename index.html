        { name: "ūüß† Koqnitiv / idrak bacarńĪqlarńĪ", items: ["∆Źsas r…ôngl…ôri ayńĪrd etm…ô (qńĪrmńĪzńĪ, g√∂y, sarńĪ, yaŇüńĪl)", "FormalarńĪ tanńĪma (dair…ô, kvadrat, √ľ√ßbucaq)", "B√∂y√ľk-ki√ßik, uzun-qńĪsa m√ľqayis…ôsi", "5-7 d…ôqiq…ô diqq…ôt c…ôml…ôm…ô (oyun v…ô ya tapŇüńĪrńĪqda)", "3 …ôŇüyanńĪ 60 saniy…ô sonra xatńĪrlama", "Sad…ô s…ôb…ôb-n…ôtic…ô …ôlaq…ôsi (d√ľym…ô basanda iŇüńĪq yanńĪr)"] },
        { name: "ūüé≠ Oyun v…ô t…ôx…ôyy√ľl", items: ["Funksional oyun (fincanla i√ßm…ô t…ôqlidi)", "Simvolik oyun (kubik = telefon)", "Sad…ô qaydalńĪ oyuna qatńĪlma (saklambac, loto)", "T…ôx…ôyy√ľll√ľ hekay…ô qurma (kuklalarla s…ôhn…ô)", "M√ľst…ôqil oyun (10 d…ôqiq…ô dayanmadan)", "Yetkin r…ôhb…ôrliyi olmadan qrup oyunu"] },

        { name: "ūüéĮ Diqq…ôt v…ô davranńĪŇü t…ônziml…ônm…ôsi", items: ["ńįst…ôk t…ôxir…ô salma (2 d…ôqiq…ô g√∂zl…ôy…ô bilm…ô)", "F…ôaliyy…ôt d…ôyiŇüikliyin…ô asan adaptasiya", "T…ôlimatńĪ eŇüidib d…ôrhal baŇülama", "Oturaq iŇüd…ô b…ôd…ôn n…ôzar…ôti (stulda oturma)", "T…ôkrarlanan h…ôr…ôk…ôtl…ôrin (stereotipl…ôrin) olmamasńĪ", "Hiperaktivlik/impulsivlik s…ôviyy…ôsi ‚Äď yaŇüa uyńüun"] }

    let answers = Array(domains.length).fill().map(() => Array(domains[0].items.length).fill(null));
    let optButtons = [];

    function renderDomains() {
        const container = document.getElementById('domainsContainer');
        container.innerHTML = '';
        optButtons = domains.map(() => []);
        domains.forEach((domain, dIdx) => {
            const section = document.createElement('div');
            section.className = 'domain-area';
            const header = document.createElement('div');
            header.className = 'domain-header';
            header.innerHTML = `<div class="domain-title"><i class="fas fa-brain"></i> ${domain.name}</div><div class="collapse-icon no-print"><i class="fas fa-chevron-down"></i></div>`;
            const body = document.createElement('div');
            body.className = 'domain-body';
            section.appendChild(header);
            section.appendChild(body);
            container.appendChild(section);

            domain.items.forEach((item, iIdx) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'subskill-item';
                itemDiv.innerHTML = `<div class="subskill-text"><i class="fas fa-caret-right"></i> ${iIdx+1}. ${item}</div><div class="rating-buttons" data-d="${dIdx}" data-i="${iIdx}"></div>`;
                body.appendChild(itemDiv);
                const btnContainer = itemDiv.querySelector('.rating-buttons');
                const btns = [];
                for (let v=0; v<=4; v++) {
                    const btn = document.createElement('div');
                    btn.className = 'rating-opt';
                    let label = '';
                    if(v===0) label='0 - bacarmńĪr / tam k√∂m…ôk';
                    else if(v===1) label='1 - minimal uyńüunluq';
                    else if(v===2) label='2 - qism…ôn uyńüun (d…ôst…ôk il…ô)';
                    else if(v===3) label='3 - davamlńĪ monitorinql…ô uyńüun';
                    else label='4 - yaŇüa tam uyńüun';
                    btn.textContent = label;
                    btn.dataset.val = v;
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        setAnswer(dIdx, iIdx, v);
                    });
                    btnContainer.appendChild(btn);
                    btns.push(btn);
                }
                const notBtn = document.createElement('div');
                notBtn.className = 'rating-opt not-obs';
                notBtn.innerHTML = '<i class="fas fa-eye-slash"></i> M√ľŇüahid…ô olunmayńĪb';
                notBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    setAnswer(dIdx, iIdx, null);
                });
                btnContainer.appendChild(notBtn);
                btns.push(notBtn);
                if(!optButtons[dIdx]) optButtons[dIdx] = [];
                optButtons[dIdx][iIdx] = btns;
                updateButtonStyles(dIdx, iIdx);
            });
            let collapsed = false;
            header.addEventListener('click', () => {
                collapsed = !collapsed;
                body.style.display = collapsed ? 'none' : 'block';
                header.querySelector('.collapse-icon').innerHTML = collapsed ? '<i class="fas fa-chevron-right"></i>' : '<i class="fas fa-chevron-down"></i>';
            });
        });
    }

    function setAnswer(d,i,val) {
        answers[d][i] = val;
        updateButtonStyles(d,i);
        saveToLocal();
    }

    function updateButtonStyles(d,i) {
        const btns = optButtons[d]?.[i];
        if(!btns) return;
        const current = answers[d][i];
        btns.forEach(btn => {
            const btnVal = btn.dataset.val;
            if(btnVal !== undefined) {
                if(current !== null && parseInt(btnVal) === current) btn.classList.add('selected');
                else btn.classList.remove('selected');
            } else {
                if(current === null) btn.classList.add('selected');
                else btn.classList.remove('selected');
            }
        });
    }

    function saveToLocal() {
        const data = {
            answers,
            childCode: document.getElementById('childCode').value,
            childAge: document.getElementById('childAge').value,
            childGender: document.getElementById('childGender').value,
            expert: document.getElementById('expert').value,
            evalDate: document.getElementById('evalDate').value,
            history: document.getElementById('history').value
        };
        localStorage.setItem('rehab_test_data', JSON.stringify(data));
    }

    function loadFromLocal() {
        const saved = localStorage.getItem('rehab_test_data');
        if(saved) {
            try {
                const data = JSON.parse(saved);
                if(data.answers) answers = data.answers;
                document.getElementById('childCode').value = data.childCode || '';
                document.getElementById('childAge').value = data.childAge || '';
                document.getElementById('childGender').value = data.childGender || 'QńĪz';
                document.getElementById('expert').value = data.expert || '';
                document.getElementById('evalDate').value = data.evalDate || '';
                document.getElementById('history').value = data.history || '';
                for(let d=0; d<domains.length; d++)
                    for(let i=0; i<domains[d].items.length; i++)
                        if(optButtons[d]?.[i]) updateButtonStyles(d,i);
            } catch(e) {}
        }
    }

    function resetAll() {
        if(!confirm('B√ľt√ľn cavablar silinsin? Bu …ôm…ôliyyat geri alńĪnmaz.')) return;
        answers = Array(domains.length).fill().map(() => Array(domains[0].items.length).fill(null));
        for(let d=0; d<domains.length; d++)
            for(let i=0; i<domains[d].items.length; i++)
                updateButtonStyles(d,i);
        document.getElementById('childCode').value = '';
        document.getElementById('childAge').value = '';
        document.getElementById('childGender').value = 'QńĪz';
        document.getElementById('expert').value = '';
        document.getElementById('evalDate').value = '';
        document.getElementById('history').value = '';
        saveToLocal();
        document.getElementById('resultPanel').classList.remove('show');
    }

    function getParentAdvice(overallPercent) {
        if(overallPercent < 35) {
            return `<div style="background:#ffe6e6; padding:20px; border-radius:28px;"><h4><i class="fas fa-exclamation-triangle"></i> Y√ľks…ôk d…ôst…ôk ehtiyacńĪ ‚Äď t…ôcili reabilitasiya</h4><ul><li>D…ôrhal reabilitasiya m…ôrk…ôzin…ô m√ľraci…ôt edin</li><li>G√ľnd…ôlik strukturlaŇüdńĪrńĪlmńĪŇü oyun vaxtńĪ (20-30 d…ôq)</li><li>Vizual d…ôst…ôkl…ôr (c…ôdv…ôl, Ňü…ôkill…ôr) hazńĪrlayńĪn</li><li>H…ôr ki√ßik uńüuru t…ôrifl…ôyin</li><li>√Ėz√ľn√ľz…ô d…ô psixoloji d…ôst…ôk alńĪn</li></ul></div>`;
        } else if(overallPercent < 55) {
            return `<div style="background:#fff0e0; padding:20px; border-radius:28px;"><h4><i class="fas fa-chart-line"></i> Orta d…ôr…ôc…ôli d…ôst…ôk ‚Äď h…ôd…ôfl…ônmiŇü terapiya</h4><ul><li>Reabilitasiya m…ôrk…ôzind…ô h…ôft…ôd…ô 1-2 seans</li><li>Evd…ô g√ľnd…ôlik 15 d…ôqiq…ôlik inkiŇüaf saatńĪ</li><li>M√ľsb…ôt davranńĪŇü d…ôst…ôyi v…ô etika sistemi qurun</li><li>YaŇüńĪd qruplarńĪna c…ôlb edin</li><li>G√ľnd…ôlik iŇü rejimini sabitl…ôŇüdirin</li></ul></div>`;
        } else if(overallPercent < 75) {
            return `<div style="background:#fef7e0; padding:20px; border-radius:28px;"><h4><i class="fas fa-leaf"></i> Y√ľng√ľl √ß…ôtinlik ‚Äď monitorinq v…ô g√ľcl…ôndirm…ô</h4><ul><li>H…ôr g√ľn birlikd…ô kitab oxuyun, Ňü…ôkill…ôr haqqńĪnda danńĪŇüńĪn</li><li>Onun maraqlarńĪna …ôsaslanan oyunlar se√ßin</li><li>Rol oyunlarńĪ il…ô sosial bacarńĪqlarńĪ artńĪrńĪn</li><li>ńįnc…ô motor √ľ√ß√ľn mozaika, boncuk iŇül…ôri</li><li>6 ay sonra t…ôkrar d…ôy…ôrl…ôndirm…ô</li></ul></div>`;
        } else {
            return `<div style="background:#e0f5ee; padding:20px; border-radius:28px;"><h4><i class="fas fa-star"></i> YaŇü normasńĪ ‚Äď d…ôst…ôkl…ôyici m√ľhit</h4><ul><li>M√ľxt…ôlif f…ôaliyy…ôtl…ôr (r…ôsm, musiqi, idman)</li><li>A√ßńĪq uclu suallar verin, cavablarńĪnńĪ dinl…ôyin</li><li>YaŇüńĪdlarńĪ il…ô vaxt ke√ßirm…ôsini t…ôŇüviq edin</li><li>H…ôr axŇüam hekay…ô oxumańüńĪ v…ôrdiŇü halńĪna g…ôtirin</li><li>ńįld…ô bir d…ôf…ô profilaktik d…ôy…ôrl…ôndirm…ô</li></ul></div>`;
        }
    }

    function generateReport() {
        const child = document.getElementById('childCode').value || 'UŇüaq';
        const age = document.getElementById('childAge').value || '?';
        const expert = document.getElementById('expert').value || 'M√ľt…ôx…ôssis';
        const date = document.getElementById('evalDate').value || new Date().toLocaleDateString();
        const anamnez = document.getElementById('history').value || 'M…ôlumat daxil edilm…ôyib.';

        let domainStats = [];
        for(let d=0; d<domains.length; d++) {
            let sum=0, count=0;
            for(let i=0; i<domains[d].items.length; i++) {
                if(answers[d][i] !== null) {
                    sum += answers[d][i];
                    count++;
                }
            }
            let percent = count === 0 ? null : (sum / (count * 4)) * 100;
            let riskLevel = '';
            if(percent === null) riskLevel = 'M…ôlumat yoxdur';
            else if(percent < 30) riskLevel = 'ūüĒī Y√ľks…ôk risk';
            else if(percent < 55) riskLevel = 'ūüü† Orta risk';
            else if(percent < 75) riskLevel = 'ūüü° Minimal risk';
            else riskLevel = 'ūüüĘ YaŇü normasńĪ';
            domainStats.push({ name: domains[d].name, percent, riskLevel });
        }

        const totalPercentArr = domainStats.filter(s => s.percent !== null).map(s => s.percent);
        const overall = totalPercentArr.length ? totalPercentArr.reduce((a,b)=>a+b,0)/totalPercentArr.length : 0;
        const parentAdvice = getParentAdvice(overall);

        const highRiskDomains = domainStats.filter(s => s.percent !== null && s.percent < 40).map(s => s.name);
        let detailedAdvice = '';
        if(highRiskDomains.length) detailedAdvice = `<p><strong><i class="fas fa-bell"></i> ∆Źn √ßox d…ôst…ôk t…ôl…ôb ed…ôn sah…ôl…ôr:</strong> ${highRiskDomains.join(', ')}. Reabilitasiya m…ôrk…ôzind…ô m…ôqs…ôdli terapiya baŇülanmalńĪdńĪr.</p>`;
        else detailedAdvice = '<p>B√ľt√ľn sah…ôl…ôr monitorinq s…ôviyy…ôsind…ôdir. Ev proqramńĪ kifay…ôtdir.</p>';

        const html = `
            <div class="no-print" style="margin-bottom:20px;"><button onclick="window.print()" style="background:#d67a2c; color:white;"><i class="fas fa-print"></i> √áap et / PDF</button></div>
            <h2><i class="fas fa-chart-simple"></i> ńįnkiŇüaf profili</h2>
            <p><strong>UŇüaq:</strong> ${child} &nbsp;| <strong>YaŇü:</strong> ${age} &nbsp;| <strong>M√ľt…ôx…ôssis:</strong> ${expert} &nbsp;| <strong>Tarix:</strong> ${date}</p>
            <p><strong>ūüďä √úmumi g√∂st…ôrici:</strong> ${overall.toFixed(1)}%</p>
            <h3>ūüďć Sah…ô profili</h3>
            ${domainStats.map(s => `<div style="margin:8px 0"><strong>${s.name}</strong> ${s.percent !== null ? s.percent.toFixed(1)+'%' : '‚ÄĒ'} ${s.riskLevel}<progress value="${s.percent || 0}" max="100" style="width:60%; height:10px; border-radius:10px;"></progress></div>`).join('')}
            <h3><i class="fas fa-lightbulb"></i> Klinik Ňü…ôrh</h3>
            ${detailedAdvice}
            <h3><i class="fas fa-hands-helping"></i> Valideynl…ôr √ľ√ß√ľn t√∂vsiy…ôl…ôr</h3>
            ${parentAdvice}
            <h3><i class="fas fa-history"></i> Anamnez</h3>
            <p>${anamnez}</p>
            <p style="margin-top:28px;"><strong>ńįmza:</strong> ______________________ (${expert})</p>
            <p style="font-size:0.7rem;">Bu hesabat reabilitasiya m…ôrk…ôzl…ôrin…ô istiqam…ôtl…ôndirm…ô m…ôqs…ôdi daŇüńĪyńĪr, diaqnoz qoymur.</p>
        `;
        document.getElementById('resultPanel').innerHTML = html;
        document.getElementById('resultPanel').classList.add('show');
        window.scrollTo({ top: document.getElementById('resultPanel').offsetTop-20, behavior: 'smooth' });
    }

    function printReport() { window.print(); }

    renderDomains();
    loadFromLocal();
    document.getElementById('resetBtn').addEventListener('click', resetAll);
    document.getElementById('reportBtn').addEventListener('click', generateReport);
    document.getElementById('printBtn').addEventListener('click', printReport);
    ['childCode','childAge','childGender','expert','evalDate','history'].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.addEventListener('input', saveToLocal);
    });
    window.addEventListener('beforeunload', saveToLocal);
</script>
</body>
